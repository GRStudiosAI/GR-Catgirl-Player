<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GR Catgirl Player</title>
<style>
/* Reset and base styles */
* { box-sizing: border-box; }
body {
  margin: 0;
  background: #120018; /* Neon purple dark theme */
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* Three-column layout */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* Sidebar (Fixed Thin) */
.sidebar {
  width: 80px;
  min-width: 80px;
  background: rgba(20, 0, 40, 0.95);
  padding: 15px 10px;
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid #7b2cff;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 100;
}

.logoimg {
  width: 50px;
  height: 50px;
  object-fit: contain;
  display: block;
  margin: 0 auto 10px;
  transition: transform 0.2s;
}

.logo {
  display: none;
}

.menu {
  width: 100%;
}

.menu button {
  width: 44px;
  height: 44px;
  margin: 10px auto;
  padding: 0;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.2s;
}

.menu button:hover, .menu button.active {
  background: #7b2cff;
  box-shadow: 0 0 10px #7b2cff;
}

/* Character Panel */
.character-panel {
  width: 250px;
  min-width: 250px;
  height: 100vh;
  background: #0d0015;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #7b2cff;
}

.character-panel img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
}

/* Main Player */
.main-player {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #180022;
  overflow: hidden;
  position: relative;
  transition: background-color 0.2s;
}

.main-player.drag-active {
  background-color: #210030;
  border: 2px dashed #9d4edd;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(20, 0, 40, 0.9);
  border-bottom: 1px solid #7b2cff;
  height: 80px;
}

.search {
  flex: 1;
  max-width: 500px;
  padding: 12px 20px;
  border-radius: 20px;
  border: 1px solid #7b2cff;
  background: rgba(123, 44, 255, 0.1);
  color: #fff;
  outline: none;
  font-size: 16px;
}

.search::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #a64dff;
  margin-left: 20px;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Banner */
.player-banner {
  width: 100%;
  height: 100px;
  background: #180022;
  border-bottom: 1px solid #7b2cff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.player-banner img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
}

/* Viewer Container & Subsections */
.viewer-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

.media-viewer {
  flex: 1;
  background: #000;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(123, 44, 255, 0.2);
  position: relative;
}

.media-viewer img, .media-viewer video {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: rgba(0,0,0,0.1);
}
::-webkit-scrollbar-thumb {
  background: #7b2cff;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: #a64dff;
}

/* Controls Container */
.controls-container {
  background: rgba(24, 0, 34, 0.9);
  padding: 15px 25px;
  border-radius: 12px;
  border: 1px solid #7b2cff;
}

.timeline-wrapper {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
}

.time-display {
  font-family: monospace;
  font-size: 14px;
  color: #d4a5ff;
  width: 60px;
  text-align: center;
}

.timeline {
  flex: 1;
  margin: 0 15px;
  cursor: pointer;
  height: 6px;
  -webkit-appearance: none;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 3px;
  outline: none;
}

.timeline::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: #a64dff;
  cursor: pointer;
  box-shadow: 0 0 10px #7b2cff;
}

.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.main-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  justify-content: center;
}

.control-btn {
  background: transparent;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.control-btn:hover {
  background: rgba(123, 44, 255, 0.3);
  color: #d4a5ff;
}

.control-btn.play-pause {
  font-size: 28px;
  width: 50px;
  height: 50px;
  background: #7b2cff;
}

.control-btn.play-pause:hover {
  background: #a64dff;
  box-shadow: 0 0 15px #7b2cff;
  color: #fff;
}

/* Side controls (Volume, Speed, Fullscreen) */
.side-controls {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 250px;
}

.side-controls.left {
  justify-content: flex-start;
}

.side-controls.right {
  justify-content: flex-end;
}

.volume-slider {
  width: 80px;
  cursor: pointer;
  height: 4px;
  -webkit-appearance: none;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
}

.speed-select {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: #fff;
  padding: 4px 8px;
  border-radius: 6px;
  outline: none;
  cursor: pointer;
}

.speed-select option {
  background: #180022;
  color: #fff;
}

/* Drag Handle Glow animations */
@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.08); opacity: 1; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="app-sidebar">
    <img class="logoimg" src="public/logos/logo.png" alt="Logo" title="GR Catgirl Player" style="margin: 15px auto 25px;">
    
    <label class="menu">
      <input type="file" id="global-file-picker" accept="image/*,video/*,audio/*" multiple style="display: none;">
      <button onclick="document.getElementById('global-file-picker').click()" title="Open Media File">
        <span>📂</span>
      </button>
    </label>

    <div class="menu" style="margin-top: 15px;">
      <button class="active" onclick="selectSection('all')" title="Player">
        <span>▶</span>
      </button>
      <button onclick="selectSection('gif')" title="GIF Player">
        <span>🎞</span>
      </button>
      <button onclick="selectSection('video')" title="Video Player">
        <span>🎥</span>
      </button>
      <button onclick="selectSection('music')" title="Music Player">
        <span>🎵</span>
      </button>
      <button onclick="selectSection('image')" title="Image Viewer">
        <span>🖼</span>
      </button>
    </div>
  </div>

  <!-- Character Panel -->
  <div class="character-panel">
    <img src="public/backgrounds/character.png" alt="Character" style="width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;">
  </div>

  <!-- Main Player -->
  <div class="main-player">
    <div class="header">
      <input class="search" id="media-search" placeholder="Search media library..." type="text">
      <div class="avatar">
        <img src="public/profiles/profile.png" alt="Profile">
      </div>
    </div>

    <!-- Banner -->
    <div class="player-banner">
      <img src="public/backgrounds/banner.png" alt="Banner" style="width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;">
    </div>

    <!-- Playlist Toolbar -->
    <div class="playlist-toolbar" id="top-playlist-toolbar" style="background: rgba(14, 0, 24, 0.95); border-bottom: 1px solid #7b2cff; padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 18px; color: #a64dff; text-shadow: 0 0 10px #7b2cff;">🗂️</span>
        <span style="font-weight: bold; font-size: 13px; text-transform: uppercase; color: #d4a5ff; letter-spacing: 0.05em; text-shadow: 0 0 8px rgba(123, 44, 255, 0.5);">Playlist Manager</span>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <select id="playlist-selector" style="background: rgba(123, 44, 255, 0.1); border: 1px solid #7b2cff; color: #fff; padding: 6px 14px; border-radius: 6px; outline: none; cursor: pointer; font-size: 13px; font-weight: bold; min-width: 150px; text-shadow: 0 0 5px rgba(123, 44, 255, 0.5);">
          <!-- Populated dynamically -->
        </select>
        <button onclick="promptCreatePlaylist()" style="background: #7b2cff; border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 10px rgba(123, 44, 255, 0.4);" onmouseover="this.style.background='#a64dff'; this.style.boxShadow='0 0 15px #7b2cff';" onmouseout="this.style.background='#7b2cff'; this.style.boxShadow='0 0 10px rgba(123, 44, 255, 0.4)';">➕ New</button>
        <button onclick="promptRenameActivePlaylist()" style="background: rgba(123, 44, 255, 0.15); border: 1px solid #7b2cff; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(123, 44, 255, 0.3)';" onmouseout="this.style.background='rgba(123, 44, 255, 0.15)';">✏️ Rename</button>
        <button onclick="confirmDeleteActivePlaylist()" style="background: rgba(255, 0, 80, 0.08); border: 1px solid #ff0050; color: #ff0050; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(255, 0, 80, 0.2)';" onmouseout="this.style.background='rgba(255, 0, 80, 0.08)';">🗑 Delete</button>
        <button onclick="triggerSavePlaylists()" style="background: #00b4d8; border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 10px rgba(0, 180, 216, 0.4);" onmouseover="this.style.background='#10e5f5'; this.style.boxShadow='0 0 15px #00b4d8';" onmouseout="this.style.background='#00b4d8'; this.style.boxShadow='0 0 10px rgba(0, 180, 216, 0.4)';">💾 Save</button>
      </div>
    </div>

    <!-- Viewer & Controls -->
    <div class="viewer-container">
      
      <!-- Split View for Media Viewer and Playlist Queue -->
      <div class="viewer-layout-row" style="display: flex; gap: 20px; flex: 1; min-height: 0; margin-bottom: 20px; position: relative;">
        
        <!-- Large Media Viewer -->
        <div class="media-viewer" id="media-viewer-container" style="flex: 1; margin-bottom: 0; height: 100%;">
          <!-- Render surface for currently playing media -->
          <h2 style="color: rgba(255,255,255,0.3)">Open a file to begin</h2>
        </div>

        <!-- Sleek Playlist Queue Panel -->
        <div id="playlist-queue-panel" style="width: 330px; min-width: 330px; background: rgba(18, 0, 30, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid #7b2cff; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 25px rgba(123, 44, 255, 0.2);">
          
          <!-- Queue Header -->
          <div style="padding: 14px 18px; border-bottom: 1px solid rgba(123, 44, 255, 0.4); display: flex; justify-content: space-between; align-items: center; background: rgba(25, 0, 45, 0.85);">
            <div>
              <h4 id="active-playlist-info-title" style="margin: 0; color: #fff; font-size: 15px; font-weight: bold; text-shadow: 0 0 5px #7b2cff;">Favorites</h4>
              <span id="active-playlist-info-count" style="font-size: 12px; color: #d4a5ff;">0 tracks</span>
            </div>
            <div style="display: flex; gap: 6px;">
              <button onclick="document.getElementById('global-file-picker').click()" style="background: rgba(123, 44, 255, 0.2); border: 1px solid #7b2cff; color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: background 0.2s;" title="Import Files" onmouseover="this.style.background='rgba(123,44,255,0.4)'" onmouseout="this.style.background='rgba(123,44,255,0.2)'">➕ Files</button>
              <button onclick="window.PlaylistManager.clearPlaylist(window.PlaylistManager.activePlaylist)" style="background: rgba(255, 0, 80, 0.1); border: 1px solid #ff0050; color: #ff0050; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: background 0.2s;" title="Clear Playlist" onmouseover="this.style.background='rgba(255,0,80,0.2)'" onmouseout="this.style.background='rgba(255,0,80,0.1)'">🧹 Clear</button>
            </div>
          </div>
          
          <!-- Track List container -->
          <div id="playlist-queue-tracks" style="flex: 1; overflow-y: auto; padding: 12px;">
            <!-- Filled dynamically -->
          </div>

          <!-- Now Playing Metadata Section -->
          <div style="padding: 14px 18px; border-top: 1px solid rgba(123, 44, 255, 0.4); background: rgba(14, 0, 24, 0.9); font-size: 12px; display: flex; flex-direction: column; gap: 6px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-weight: bold; color: #d4a5ff; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; text-shadow: 0 0 5px rgba(123,44,255,0.5);">💿 Now Playing</span>
              <span id="loop-status-indicator" style="background: rgba(123, 44, 255, 0.25); border: 1px solid #7b2cff; padding: 2px 8px; border-radius: 10px; font-size: 9px; color: #fff; font-weight: bold;">Loop: OFF</span>
            </div>
            <div id="now-playing-title" style="font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px;">None</div>
            <div style="display: flex; justify-content: space-between; color: rgba(255,255,255,0.55); font-size: 11px;">
              <span id="now-playing-position">No track playing</span>
              <span id="now-playing-playlist-name" style="max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Empty</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Controls Row -->
      <div class="controls-container">
        <div class="timeline-wrapper">
          <span class="time-display" id="current-time">0:00</span>
          <input type="range" class="timeline" id="timeline" value="0" min="0" max="100" step="0.1">
          <span class="time-display" id="duration">0:00</span>
        </div>
        
        <div class="controls-row">
          <div class="side-controls left">
            <button class="control-btn" id="btn-volume-mute" title="Mute">🔊</button>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
          </div>

          <div class="main-controls">
            <button class="control-btn" id="btn-prev" title="Previous">⏮</button>
            <button class="control-btn" id="btn-rewind" title="Rewind">⏪</button>
            <button class="control-btn" id="btn-stop" title="Stop">⏹</button>
            <button class="control-btn play-pause" id="btn-play-pause" title="Play/Pause">▶</button>
            <button class="control-btn" id="btn-replay" title="Loop Mode (Off / Current / Playlist)">🔄</button>
            <button class="control-btn" id="btn-fast-forward" title="Fast Forward">⏩</button>
            <button class="control-btn" id="btn-next" title="Next">⏭</button>
          </div>

          <div class="side-controls right">
            <select class="speed-select" id="speed-select" title="Playback Speed">
              <option value="0.25">0.25x</option>
              <option value="0.5">0.5x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2.0x</option>
            </select>
            <button class="control-btn" id="btn-fullscreen" title="Fullscreen">⛶</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Scripts injected here -->
<script src="js/playlistManager.js"></script>
<script src="js/controls.js"></script>
<script src="js/imageViewer.js"></script>
<script src="js/gifPlayer.js"></script>
<script src="js/videoPlayer.js"></script>
<script src="js/musicPlayer.js"></script>
<script>
  // Entry point for handling selected files from global picker
  document.getElementById('global-file-picker').addEventListener('change', (e) => {
    if (window.PlaylistManager && e.target.files && e.target.files.length > 0) {
      window.PlaylistManager.addFilesToActivePlaylist(e.target.files);
    }
  });

  // Active media filter categories
  window.currentMediaTypeFilter = 'all';
  function selectSection(filter) {
    window.currentMediaTypeFilter = filter;
    
    // Smooth transition active links
    const menuButtons = document.querySelectorAll('.sidebar .menu button');
    menuButtons.forEach(btn => btn.classList.remove('active'));
    
    // Match correct title to set selected state
    const targetTitle = filter === 'all' ? 'Player' : filter === 'gif' ? 'GIF Player' : filter === 'video' ? 'Video Player' : filter === 'music' ? 'Music Player' : 'Image Viewer';
    menuButtons.forEach(btn => {
      if (btn.title === targetTitle) {
        btn.classList.add('active');
      }
    });

    if (window.PlaylistManager) {
      window.PlaylistManager.renderPlaylistQueue();
    }
  }

  // Playlist toolbar bindings
  function promptCreatePlaylist() {
    const name = prompt('Enter a name for your new custom playlist:');
    if (name) {
      const success = window.PlaylistManager.createPlaylist(name);
      if (success) {
        window.PlaylistManager.selectPlaylist(name.trim());
      } else {
        alert('Playlist name is either empty, invalid, or already exists.');
      }
    }
  }

  function promptRenameActivePlaylist() {
    if (window.PlaylistManager) {
      const active = window.PlaylistManager.activePlaylist;
      if (active === 'Favorites' || active === 'Recently Played') {
        alert('Cannot rename system playlists (Favorites, Recently Played).');
        return;
      }
      window.PlaylistManager.promptRenamePlaylist(active);
    }
  }

  function confirmDeleteActivePlaylist() {
    if (window.PlaylistManager) {
      const active = window.PlaylistManager.activePlaylist;
      if (active === 'Favorites' || active === 'Recently Played') {
        alert('Cannot delete system playlists (Favorites, Recently Played).');
        return;
      }
      window.PlaylistManager.confirmDeletePlaylist(active);
    }
  }

  function triggerSavePlaylists() {
    if (window.PlaylistManager) {
      window.PlaylistManager.saveAllToStorage();
      
      // Visual feedback toast or confirmation bar
      const btn = document.querySelector('button[onclick="triggerSavePlaylists()"]');
      const originalText = btn.textContent;
      btn.textContent = '💾 Saved! ⭐';
      btn.style.background = '#2ec4b6';
      btn.style.boxShadow = '0 0 15px #2ec4b6';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '#00b4d8';
        btn.style.boxShadow = '0 0 10px rgba(0, 180, 216, 0.4)';
      }, 1500);
    }
  }

  // Active playlist change handler
  document.getElementById('playlist-selector').addEventListener('change', (e) => {
    if (window.PlaylistManager) {
      window.PlaylistManager.selectPlaylist(e.target.value);
    }
  });

  // Setup live search querying across playlists
  document.getElementById('media-search').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const rows = document.querySelectorAll('.queue-track-row');
    
    rows.forEach(row => {
      const nameEl = row.querySelector('span[title]');
      if (nameEl) {
        const title = nameEl.getAttribute('title').toLowerCase();
        if (title.includes(query)) {
          row.style.display = 'flex';
        } else {
          row.style.display = 'none';
        }
      }
    });
  });
</script>
</body>
</html>
